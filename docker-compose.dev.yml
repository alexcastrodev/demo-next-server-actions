services:
  backend:
    build:
      context: ./backend
    ports:
      - "4567:4567"
    environment:
      RACK_ENV: development
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
    volumes:
      - ./backend:/app
      - backend_db:/app/db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.next.dev
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4567

volumes:
  backend_db:
